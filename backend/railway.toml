# Railway config for the Yield Intelligence backend.
#
# Deploy from the backend/ directory:
#   railway link          (from backend/ dir, pick your service)
#   railway up
#
# Required environment variables (set via Railway dashboard or `railway variables set`):
#   JWT_SECRET          strong random value, e.g. `openssl rand -hex 32`
#   CORS_ORIGINS        your frontend URL, e.g. https://yi-frontend.up.railway.app
#
# Optional:
#   YI_ENV              set to "production" to harden dev-secret guard
#
# Railway auto-injects:
#   PORT                the port the container must bind to
#   RAILWAY_ENVIRONMENT set when running on Railway (triggers JWT guard)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "sh -c 'uvicorn api:app --host 0.0.0.0 --port ${PORT}'"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Persistent volume for SQLite. Without this, the DB resets on every
# deploy. Mount path must match YIELD_DB_PATH's directory in Dockerfile.
[[deploy.volumes]]
mountPath = "/data"
name = "yi-data"
